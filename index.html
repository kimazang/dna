<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>큐플레이 DNA 테스트</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kimazang/kimazang.github.io/main/qp_favicon.png">
    <meta property="og:type" content="website">
    <meta property="og:title" content="큐플레이 DNA 테스트">
    <meta property="og:description" content="내 안의 숨겨진 큐플 본능은? 지금 바로 나의 유저 타입을 알아보자!">
    <meta property="og:image" content="https://raw.githubusercontent.com/kimazang/dna/main/qplaydnatest_thum.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'NeoDunggeunmo', sans-serif; 
            background-color: #c4d7f5;
            background-image: radial-gradient(#8cbcf0 1px, transparent 1px);
            background-size: 16px 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 15px;
            color: #1a497d;
        }

        .qplay-panel {
            background: #ffffff;
            border: 2px solid #1a497d;
            box-shadow: 6px 6px 0px rgba(26, 73, 125, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 5px;
            border-radius: 4px;
        }

        .qplay-inner-box {
            background-color: #eef5fc;
            border: 2px solid #1a497d;
            overflow: hidden;
            position: relative;
        }

        .qplay-header {
            background: linear-gradient(90deg, #3b88e3, #6cb2f9);
            color: #fff;
            padding: 10px 12px;
            border-bottom: 2px solid #1a497d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            text-shadow: 1px 1px 0px #0a2342;
        }

        .btn-pixel {
            border: 2px solid #1a497d;
            box-shadow: 3px 3px 0px #1a497d;
            transition: all 0.1s;
            cursor: pointer;
            width: 100%;
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 2px;
            font-size: 1.1rem;
        }
        .btn-pixel:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #1a497d; }

        .btn-start { background: #ffeb3b; color: #1a497d; font-size: 1.4rem; }
        .btn-option { background: #ffffff; border-color: #f0547a; box-shadow: 3px 3px 0px #f0547a; color: #1a497d; text-align: left; line-height: 1.5; padding: 12px; font-size: 1rem; }
        .btn-blue { background: #4ea3ff; color: #fff; text-shadow: 1px 1px 0px #1a497d; }

        .qplay-input { border: 2px solid #1a497d; background: #fff; padding: 12px; outline: none; width: 100%; font-size: 1.2rem; text-align: center; color: #1a497d; }

        .loading-dots { display: flex; justify-content: center; gap: 4px; background: #ffffff; padding: 6px; border: 2px solid #8cbcf0; margin-bottom: 15px; border-radius: 4px; }
        .dot { width: 8px; height: 8px; background: #eef5fc; border: 1px solid #8cbcf0; border-radius: 50%; }
        .dot.active { background: #ffeb3b; border-color: #1a497d; }

        .keyword-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; text-align: left; }
        .keyword-badge { background: #ffffff; border: 2px solid #1a497d; color: #f0547a; padding: 8px 4px; font-size: 0.85rem; text-align: center; box-shadow: 2px 2px 0px #1a497d; white-space: nowrap; }

        .profile-box { background: #fff; border: 2px solid #1a497d; }
        .profile-header { background: #eef5fc; border-bottom: 2px solid #1a497d; color: #1a497d; padding: 6px 10px; font-size: 0.9rem; text-align: left; }

        .pixel-text-shadow { text-shadow: 2px 2px 0px #1a497d; }
        .hidden { display: none !important; }
        .win-btn-group { display: flex; gap: 4px; }
        .win-btn { width: 10px; height: 10px; border: 1px solid #1a497d; background: #fff; }

        /* 캡처 시 텍스트 밀림 방지용 보정 스타일 */
        .capture-fix-text {
            line-height: 1.6 !important;
            display: block;
            width: 100%;
        }
        /* 말풍선 수직 정렬 보정 (Flex 대신 Padding 사용) */
        .speech-bubble {
            background-color: #ffffff;
            border: 2px solid #1a497d;
            padding: 12px 10px; /* 상하 여백을 직접 줌 */
            position: relative;
            border-radius: 8px;
            min-height: 60px;
            display: block; 
        }
    </style>
</head>
<body>

    <div class="qplay-panel" id="main-container">
        
        <div id="start-page" class="qplay-inner-box">
            <div class="qplay-header">
                <span class="flex items-center gap-2"><span class="text-yellow-300">★</span> QUIZ_DNA.exe</span>
                <div class="win-btn-group">
                    <div class="win-btn"></div>
                    <div class="win-btn"></div>
                    <div class="win-btn bg-red-400"></div>
                </div>
            </div>
            
            <div class="p-5 bg-white m-2 border-2 border-dashed border-[#8cbcf0] text-center relative overflow-hidden">
                <div class="inline-block px-3 py-1 bg-[#eef5fc] text-[#1a497d] text-sm mb-2 border-2 border-[#1a497d] font-bold">
                    내 안의 숨겨진 큐플 본능은?
                </div>
                <div class="my-2"><h1 class="text-4xl text-[#ffeb3b] pixel-text-shadow tracking-wide leading-tight inline-block">QPLAY DNA</h1></div>
                <div class="mb-4 mt-4 text-left">
                    <p class="text-sm mb-1 text-[#1a497d] ml-1 font-bold">닉네임</p>
                    <input type="text" id="user-nickname" class="qplay-input" placeholder="닉네임 입력" maxlength="8">
                </div>
                <button onclick="startQuiz()" class="btn-pixel btn-start font-bold">테스트 시작</button>
            </div>
        </div>

        <div id="quiz-page" class="hidden qplay-inner-box flex flex-col h-full">
            <div class="qplay-header">
                <span>게임 진행 중...</span>
                <span id="progress-text" class="text-yellow-300 text-sm">0 / 12</span>
            </div>
            <div class="p-4 bg-white m-2 border-2 border-dashed border-[#8cbcf0] flex-grow flex flex-col justify-center">
                <div class="loading-dots" id="dots-container"></div>
                <div class="bg-[#eef5fc] border-2 border-[#1a497d] p-4 mb-5 min-h-[110px] flex items-center justify-center">
                    <h2 id="question-label" class="text-base text-center leading-relaxed break-keep text-[#1a497d] font-bold">질문 로딩 중...</h2>
                </div>
                <div class="flex flex-col gap-3">
                    <button id="opt1" class="btn-pixel btn-option text-sm"></button>
                    <button id="opt2" class="btn-pixel btn-option text-sm"></button>
                </div>
            </div>
        </div>

        <div id="result-page" class="hidden">
            <div id="capture-target" class="qplay-inner-box" style="background-color: #eef5fc;">
                <div class="qplay-header">
                    <span>Result_Info.txt</span>
                    <div class="win-btn-group">
                        <div class="win-btn"></div>
                        <div class="win-btn"></div>
                        <div class="win-btn bg-red-400"></div>
                    </div>
                </div>
                
                <div class="p-4 bg-white m-2 border-2 border-[#eef5fc] relative">
                    <div class="text-center mb-4">
                        <div class="inline-block bg-[#1a497d] text-white px-3 py-1 text-xs mb-2">분석 완료</div>
                        <h3 class="text-lg mb-2 font-bold"><span id="final-name" class="text-[#f0547a] text-xl"></span> 님의 유저 타입</h3>
                        <div class="mb-3">
                            <h2 id="final-title" class="text-xl text-[#1a497d] bg-[#ffeb3b] inline-block px-4 py-2 border-2 border-[#1a497d] shadow-[2px_2px_0px_#1a497d] font-bold"></h2>
                        </div>
                        <p id="final-desc" class="text-xs text-gray-700 break-keep font-bold capture-fix-text"></p>
                    </div>

                    <div class="mt-4 mb-4 text-left">
                        <p id="res-keywords-header" class="text-sm text-[#1a497d] mb-2 font-bold"></p>
                        <div id="final-keywords" class="keyword-grid"></div>
                    </div>

                    <div class="mb-2 text-left">
                        <p id="res-friends-header" class="text-sm text-[#1a497d] mb-2 pl-1 font-bold"></p>
                        <div class="profile-box flex flex-col shadow-[2px_2px_0px_#1a497d]">
                            <div class="profile-header flex justify-between font-bold">
                                <span>아장</span>
                                <span class="text-[#3b88e3] text-xs">MBTI는 CUTE</span>
                            </div>
                            <div class="flex p-3 gap-3 bg-[#fdfdfd]">
                                <div class="w-14 h-14 bg-[#eef5fc] border-2 border-[#1a497d] shrink-0 relative overflow-hidden rounded">
                                    <img src="https://raw.githubusercontent.com/kimazang/kimazang.github.io/main/az_devil.png" alt="아장" crossorigin="anonymous" class="w-full h-full object-cover">
                                </div>
                                <div class="speech-bubble flex-grow">
                                    <div class="absolute -left-[9px] top-[15px] w-0 h-0 border-t-[5px] border-t-transparent border-r-[8px] border-r-[#1a497d] border-b-[5px] border-b-transparent"></div>
                                    <div class="absolute -left-[6px] top-[15px] w-0 h-0 border-t-[5px] border-t-transparent border-r-[8px] border-r-white border-b-[5px] border-b-transparent z-10"></div>
                                    <p id="final-friendship" class="text-xs font-bold capture-fix-text break-keep"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 
            </div>

            <div class="flex gap-2 mt-3 px-1 pb-1">
                <button onclick="saveResultImage()" class="btn-pixel btn-start font-bold text-[1rem] w-1/2 !bg-[#f0547a] !text-white !shadow-[3px_3px_0px_#1a497d]">사진 저장</button>
                <button onclick="location.reload()" class="btn-pixel btn-blue font-bold text-[1rem] w-1/2">다시 하기</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { type: 'SN', q: "Q. 대기실에서 잠수 타며 멍 때릴 때, 내 머릿속은?", a: ["'쟤네 둘이 그렇고 그런 사인가?', '갑자기 성전환 하면 웃기겠다' 🌀", "N"], b: ["'렙업까지 경험치 얼마나 남았지?', '아까 본 그 옷 얼마더라?' 🧮", "S"] },
            { type: 'EI', q: "Q. 아장 님의 이벤트가 끝난 후 나의 상태는?", a: ["수고하셨습니다~ 하얗게 불태웠다... 🛏️", "I"], b: ["아, 재밌었다! 뒷풀이 할까요? 더 놀고 싶다! 🔥", "E"] },
            { type: 'JP', q: "Q. 큐플레이에 접속하는 나의 평소 패턴은?", a: ["'오, 오늘 사람 많네? 이거 할까 저거 할까~' 그때그때 삘 꽂히는 대로 플레이한다. 🎲", "P"], b: ["'오늘은 꼬로록 하면서 돈 좀 모아야지.' 나름의 확고한 목표와 투두리스트가 있다. 📝", "J"] },
            { type: 'TF', q: "Q. 큐친들이 사소한 문제로 감정싸움을 하고 있다. 이때 나는?", a: ["재밌자고 하는 게임에서 왜 이렇게까지 싸우지 💔", "F"], b: ["흠... 근데 상황을 보면 B 말이 맞는데? ⚖️", "T"] },
            { type: 'EI', q: "Q. 게임 방에 처음 입장했을 때 나는?", a: ["안녕하세요~ 일단 인사부터 한다. 💬", "E"], b: ["방 분위기랑 유저들 아바타부터 쓱 스캔한다. 👀", "I"] },
            { type: 'SN', q: "Q. 베스트 드레서 이벤트가 열렸다! 나의 코디 스타일은?", a: ["깔끔한 색감과 조화로운 아이템 조합으로 승부하는 '정석 코디' 👗", "S"], b: ["'이번 컨셉은 마녀...' 나만의 스토리와 세계관이 담긴 '컨셉 코디' 🔮", "N"] },
            { type: 'JP', q: "Q. 경험치 2배 이벤트라 빡겜하려 했는데, 갑자기 긴급 서버 점검 공지가 떴다!", a: ["갑자기 점검이라고? 끝날 때까지 유튜브나 보고 와야겠네 🍿", "P"], b: ["뭐야? 세팅 다 해놨는데 짜증나네... 프리렌 장난하냐 😤", "J"] },
            { type: 'TF', q: "Q. 너무 갖고 싶었던 레어템을 드디어 구해서 자랑했다! 내가 듣고 싶은 반응은?", a: ["우와! 매물 없던데 어떻게 구했어? 싸게 잘 샀네! 👏", "T"], b: ["대박,, 너랑 완전 찰떡이야!!! 기분 짱 좋겠다! 🎉", "F"] },
            { type: 'EI', q: "Q. 게임 몇 판 했더니 같은 방 유저가 친추를 걸었다!", a: ["'헉... 아직 좀 낯선데...' 고민 끝에 조심스레 Yes or No", "I"], b: ["다음에 또 같이 해요! 쿨하게 바로 수락하고 친목 모드 🤝", "E"] },
            { type: 'TF', q: "Q. 브레인 써바써바 중, 친구의 실수로 아깝게 죽었을 때 내 속마음은?", a: ["아깝다... 친구한테 빨리 괜찮다고 해줘야지. 🥺", "F"], b: ["아깝다... 내가 계산기 켜놨으면 무조건 통과했는데. 🤔", "T"] },
            { type: 'SN', q: "Q. 공지사항이나 패치노트가 올라왔을 때 나는?", a: ["이거 나오면 떡상각 아님? 앞으로 바뀔 게임 메타를 떠올려 본다. 💭", "N"], b: ["참여 방법, 가격, 리워드 등 정확한 팩트부터 꼼꼼히 정독한다. 📊", "S"] },
            { type: 'JP', q: "Q. 오늘 밤 9시, 탱글아장배 대회가 열린다!", a: ["8시 50분부터 이미 접속 완료. 손 풀면서 룰 한 번 더 숙지하고 대기한다. ⏰", "J"], b: ["8시 59분에 맞다, 오늘 대회지! 생각나서 헐레벌떡 뛰어 들어간다. 🏃‍♂️", "P"] }
        ];

        const results = {
            "ENTJ": { title: "판을 이끄는 리더", desc: "카리스마로 방 전체를 압도하는 당신은 최고의 리더!<br>철저한 계획과 실행력으로 모든 게임을 승리로 이끌죠.", keywords: ["#타고난_리더", "#효율성_집착", "#야망_보스", "#전략적_사고"], friendship: "오늘 수다 코스는 너가 정해줘! 난 옆에서 신나게 떠들 준비 끝났어!" },
            "ENTP": { title: "센스 있는 채팅러", desc: "번뜩이는 재치와 화려한 입담으로 대기실을 뒤집는 당신!<br>논리적인 토론을 즐기며 새로운 공략을 찾아내는 천재예요.", keywords: ["#아이디어_뱅크", "#유쾌한_관종", "#호기심_천국", "#팩트_폭격기"], friendship: "우리 둘이 놀면 조용할 틈이 없겠는데? 밤새 티키타카 하자!" },
            "INTJ": { title: "조용한 전략가", desc: "남다른 통찰력으로 게임의 판도를 미리 읽는 전략가!<br>혼자만의 시간을 즐기며 완벽한 승리를 쟁취하는 타입이죠.", keywords: ["#완벽주의자", "#마스터마인드", "#확고한_취향", "#독립적_성향"], friendship: "뻔하지 않은 깊은 대화가 잘 통해서 너무 설레! 우리끼리만 아는 얘기 더 하자!" },
            "INTP": { title: "파고드는 분석가", desc: "호기심 가득한 눈으로 큐플 원리를 파헤치는 분석가!<br>귀찮음도 이기는 지적 욕구로 남모르는 꿀팁을 찾아내요.", keywords: ["#게으른_천재", "#지적_호기심", "#마이웨이", "#논리적_분석"], friendship: "그런 특이하고 재밌는 생각은 대체 어떻게 하는 거야? 너무 흥미로워!" },
            "ENFJ": { title: "리액션 끝판왕", desc: "따뜻한 리액션과 배려로 모든 유저를 하나로 묶는 마당발!<br>정의로운 마음으로 친구들의 고민을 다 들어주는 천사예요.", keywords: ["#인간_리트리버", "#따뜻한_카리스마", "#공감_만렙", "#프로_오지랖"], friendship: "와, 리액션 최고! 너랑 대화하면 자존감이 올라가는 기분이라 너무 좋아!" },
            "ENFP": { title: "활발한 컨셉장인", desc: "통통 튀는 매력으로 어디서든 존재감을 뽐내는 메이커!<br>상상력 풍부한 당신은 큐플 세상의 자유로운 영혼입니다.", keywords: ["#인간_비타민", "#자유로운_영혼", "#상상력_대장", "#새로운_것이_좋아"], friendship: "혹시 내 쌍둥이 아니야? 우리 신나게 놀다가 잠수 타는 타이밍도 딱일 듯!" },
            "INFJ": { title: "조용한 공감러", desc: "조용히 상대의 마음을 꿰뚫어 보는 신비로운 아우라!<br>겉은 부드럽지만 속은 누구보다 확고한 신념이 있습니다.", keywords: ["#겉바속촉", "#통찰력_갑", "#보이지_않는_배려", "#속마음_비밀"], friendship: "굳이 긴 말 안 해도 내 마음 다 읽어줄 것만 같아! 그냥 옆에만 있어도 힐링돼!" },
            "INFP": { title: "감성 살리는 낭만러", desc: "풍부한 감수성으로 세상을 자신만의 색으로 채우는 낭만파!<br>조금은 내향적이지만 나만의 예술적 감각이 돋보여요.", keywords: ["#프로_몽상가", "#감성_충만", "#평화주의자", "#나만의_신념"], friendship: "우리 감성 완전 소울메이트급인데? 예쁜 옷 입고 앉아서 소소하게 떠드는 거 최고!" },
            "ESTJ": { title: "흐름 잡는 리더", desc: "규칙과 질서를 사랑하며 책임을 다하는 든든한 유저!<br>효율적인 플레이로 큐플 경제를 이끄는 능력자랍니다.", keywords: ["#인간_엑셀", "#철저한_계획", "#책임감_끝판왕", "#팩트_체크"], friendship: "대화가 착착 진행돼서 너무 좋아! 오늘 못한 수다는 내일 또 이어서 하자!" },
            "ESTP": { title: "즉흥적 행동파", desc: "강한 생존 본능과 적응력으로 서바이벌을 휩쓰는 행동파!<br>지루한 건 못 참아! 언제 어디서든 스릴을 즐깁니다.", keywords: ["#행동파_불도저", "#임기응변_갑", "#스릴_즐김", "#강한_적응력"], friendship: "고민은 사치! 당장 들어와서 같이 놀자! 너랑 있으면 뭘 해도 다 즐거워!" },
            "ISTJ": { title: "묵묵한 성실러", desc: "묵묵히 자신의 자리를 지키며 성실히 렙업하는 노력파!<br>꼼꼼한 디테일과 기억력으로 완벽한 승리를 거둬요.", keywords: ["#원칙주의자", "#성실함의_표본", "#기억력_디테일", "#안정감_최고"], friendship: "내가 했던 사소한 말까지 다 기억해 주니 감동이야! 조근조근 대화하도록 해볼게." },
            "ISTP": { title: "조용한 실속파", desc: "군더더기 없는 깔끔한 플레이를 선호하는 조용한 승부사!<br>뛰어난 기술로 위기 상황도 쿨하게 넘겨버립니다.", keywords: ["#효율성_최고", "#만사가_귀찮음", "#조용한_관찰자", "#팩트만_말함"], friendship: "억지로 말 안 이어가도 안 어색해서 너무 좋아! 그냥 같이 서 있기만 해도 이미 찐친!" },
            "ESFJ": { title: "사람 챙기는 친목러", desc: "다정한 성격과 배려심으로 대기실을 밝히는 센스쟁이!<br>주변 친구들을 살뜰히 챙기며 모두에게 사랑받는 타입이죠.", keywords: ["#리액션_부자", "#인간관계_중심", "#친화력_대장", "#세심한_챙김"], friendship: "항상 챙겨줘서 고마워! 나도 이제부터 너의 1호 리액션 담당이 되어줄게!" },
            "ESFP": { title: "시선 끄는 스타", desc: "화려한 아바타와 이펙트로 모든 이의 시선을 사로잡는 스타!<br>지금 이 순간의 즐거움을 가장 잘 아는 인기스타입니다.", keywords: ["#분위기_메이커", "#에너지_뿜뿜", "#즉흥적인_즐거움", "#낙천주의자"], friendship: "오늘 같이 웃고 떠드느라 광대 아플 예정! 너랑 있으면 세상에서 제일 신나!" },
            "ISFJ": { title: "따뜻한 배려요정", desc: "보이지 않는 곳에서 친구를 도와주는 헌신적인 수호신!<br>디테일을 놓치지 않는 세심함의 끝판왕 존재랍니다.", keywords: ["#수호천사", "#조용한_헌신", "#디테일_장인", "#갈등은_싫어"], friendship: "내가 조용히 있고 싶을 때도 묵묵히 옆을 지켜줄 것 같아 든든해! 너도 언제든 불러줘!" },
            "ISFP": { title: "느긋한 평화주의자", desc: "자유를 사랑하는 온화한 성격으로 현재를 즐기는 유저!<br>다툼보다는 평화를 선호하며 예술가적인 면모를 뽐내요.", keywords: ["#침대와_물아일체", "#갈등_회피러", "#예술적_감각", "#현재를_즐김"], friendship: "명당에 누워서 멍 때리며 수다나 떨자~ 님이랑 노는 게 제일 편하고 좋아!" }
        };

        let nickname = "";
        let currentIdx = 0;
        let shuffledQuiz = [];
        let score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function initDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            for(let i=0; i<12; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.id = `dot-${i}`;
                container.appendChild(dot);
            }
        }

        function startQuiz() {
            nickname = document.getElementById('user-nickname').value.trim();
            if(!nickname) { alert("닉네임을 입력해주세요!"); return; }
            shuffledQuiz = [...questions].sort(() => Math.random() - 0.5);
            initDots();
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const qData = shuffledQuiz[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / 12`;
            document.getElementById('question-label').innerText = qData.q;
            for(let i=0; i<12; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= currentIdx) dot.classList.add('active');
                else dot.classList.remove('active');
            }
            const opts = [{ text: qData.a[0], type: qData.a[1] }, { text: qData.b[0], type: qData.b[1] }].sort(() => Math.random() - 0.5);
            document.getElementById('opt1').innerText = opts[0].text;
            document.getElementById('opt1').onclick = () => onSelect(opts[0].type);
            document.getElementById('opt2').innerText = opts[1].text;
            document.getElementById('opt2').onclick = () => onSelect(opts[1].type);
        }

        function onSelect(type) {
            score[type]++;
            currentIdx++;
            if(currentIdx < 12) renderQuestion();
            else showResult();
        }

        function showResult() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            let mbti = (score.E >= score.I ? "E" : "I") + (score.S >= score.N ? "S" : "N") + (score.T >= score.F ? "T" : "F") + (score.J >= score.P ? "J" : "P");
            const data = results[mbti];
            document.getElementById('final-name').innerText = nickname;
            document.getElementById('final-title').innerText = data.title;
            document.getElementById('final-desc').innerHTML = data.desc;
            document.getElementById('final-friendship').innerText = data.friendship;
            document.getElementById('res-keywords-header').innerText = `▼ ${nickname} 님을 설명하는 키워드!`;
            document.getElementById('res-friends-header').innerText = `▼ ${nickname} 님과 잘 맞는 친구는?`;
            const keywordContainer = document.getElementById('final-keywords');
            keywordContainer.innerHTML = '';
            data.keywords.forEach(kw => {
                const span = document.createElement('span');
                span.className = 'keyword-badge';
                span.innerText = kw;
                keywordContainer.appendChild(span);
            });
        }

        function saveResultImage() {
            const target = document.getElementById('capture-target');
            // 저장 버튼을 누르는 동안 잠깐 텍스트 위치를 확실히 잡기 위해 옵션 추가
            html2canvas(target, {
                useCORS: true,
                backgroundColor: "#eef5fc",
                scale: 2,
                logging: false,
                onclone: (clonedDoc) => {
                    // 클론된 문서에서 텍스트 정렬이 밀리지 않도록 재확인
                    const desc = clonedDoc.getElementById('final-desc');
                    const friend = clonedDoc.getElementById('final-friendship');
                    if(desc) desc.style.lineHeight = "1.6";
                    if(friend) friend.style.lineHeight = "1.6";
                }
            }).then(canvas => {
                const imgUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = imgUrl;
                link.download = `${nickname}_큐플DNA.png`;
                link.click();
            }).catch(err => {
                alert('이미지 저장에 실패했습니다.');
            });
        }
    </script>
</body>
